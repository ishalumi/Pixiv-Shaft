name: CI

on:
  push:
    branches:
      - master
      - classic
    tags:
      - 'v*-isha.*'
  pull_request:
    branches:
      - master
      - classic
  workflow_dispatch:

# 默认 token 只读会导致 softprops/gh-release 403 → Too many retries → 失败邮件
permissions:
  contents: write
  actions: read

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build apk
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 不用 setup-gradle 的 cache（本机 cache 服务常 400，刷 annotation）
      - name: Setup Gradle wrapper
        run: chmod +x gradlew

      - name: Restore ishalumi signing keystore
        env:
          SHAFT_KEYSTORE_BASE64: ${{ secrets.SHAFT_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SHAFT_KEYSTORE_BASE64" ]; then
            echo "SHAFT_KEYSTORE_BASE64 missing" >&2
            exit 1
          fi
          echo "$SHAFT_KEYSTORE_BASE64" | base64 -d > isha-shaft.jks
          rm -f keystore.jks
          ls -la isha-shaft.jks

      - name: Detect branch
        if: github.ref_type == 'branch'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "APK_SUFFIX=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Build debug apk
        if: github.ref_type == 'branch'
        env:
          SHAFT_EVENTS_HMAC: ${{ secrets.SHAFT_EVENTS_HMAC }}
          SHAFT_KEYSTORE_PASSWORD: ${{ secrets.SHAFT_KEYSTORE_PASSWORD }}
          SHAFT_KEY_ALIAS: ${{ secrets.SHAFT_KEY_ALIAS }}
          SHAFT_KEY_PASSWORD: ${{ secrets.SHAFT_KEY_PASSWORD }}
        run: ./gradlew assembleGithubDebug --no-daemon

      - name: Upload debug artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ env.APK_SUFFIX }}
          path: app/build/outputs/apk/github/debug
          if-no-files-found: error

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SHAFT_KEYSTORE_BASE64: ${{ secrets.SHAFT_KEYSTORE_BASE64 }}
        run: |
          version_tag=${GITHUB_REF#refs/tags/}
          version_tag_short=${version_tag#v}
          echo "VERSION_TAG=$version_tag" >> $GITHUB_ENV
          echo "VERSION_TAG_SHORT=$version_tag_short" >> $GITHUB_ENV
          TAG_MESSAGE=$(git cat-file tag "$version_tag" 2>/dev/null | sed '1,/^$/d' || true)
          if [ -z "$TAG_MESSAGE" ]; then TAG_MESSAGE="Release $version_tag"; fi
          echo "$TAG_MESSAGE" > /tmp/tag_message.txt
          echo "$SHAFT_KEYSTORE_BASE64" | base64 -d > isha-shaft.jks
          rm -f keystore.jks

      - name: Build release apk
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SHAFT_EVENTS_HMAC: ${{ secrets.SHAFT_EVENTS_HMAC }}
          SHAFT_KEYSTORE_PASSWORD: ${{ secrets.SHAFT_KEYSTORE_PASSWORD }}
          SHAFT_KEY_ALIAS: ${{ secrets.SHAFT_KEY_ALIAS }}
          SHAFT_KEY_PASSWORD: ${{ secrets.SHAFT_KEY_PASSWORD }}
        run: ./gradlew assembleGithubRelease --no-daemon --stacktrace

      - name: Package release apk
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp app/build/outputs/apk/github/release/app-github-release.apk app-release.apk
          APK_NAME="Shaft-Isha_${VERSION_TAG_SHORT}.apk"
          cp app-release.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          sha1=$(sha1sum app-release.apk | awk '{ print toupper($1) }')
          sha256=$(sha256sum app-release.apk | awk '{ print toupper($1) }')
          {
            cat /tmp/tag_message.txt
            echo ""
            echo "Fork: ishalumi/Pixiv-Shaft (upstream classic)"
            echo ""
            echo '```'
            echo "SHA-1: $sha1"
            echo "SHA-256: $sha256"
            echo '```'
          } > release_notes.md

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: |
            ${{ env.APK_NAME }}
            app-release.apk
          if-no-files-found: error

      # 用 gh CLI 发版，失败不重试 3 次刷邮件；token 已有 contents:write
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if gh release view "$VERSION_TAG" >/dev/null 2>&1; then
            gh release upload "$VERSION_TAG" "$APK_NAME" --clobber
            gh release edit "$VERSION_TAG" --notes-file release_notes.md
          else
            gh release create "$VERSION_TAG" "$APK_NAME" \
              --title "$VERSION_TAG" \
              --notes-file release_notes.md
          fi
