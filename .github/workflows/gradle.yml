name: CI

on:
  push:
    branches:
      - master
      - classic
    tags:
      - v*.*.*
      - 'v*-isha.*'
  pull_request:
    branches:
      - master
      - classic
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build apk
    runs-on: ubuntu-24.04

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.2
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore ishalumi signing keystore
        env:
          SHAFT_KEYSTORE_BASE64: ${{ secrets.SHAFT_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SHAFT_KEYSTORE_BASE64" ]; then
            echo "SHAFT_KEYSTORE_BASE64 missing" >&2
            exit 1
          fi
          echo "$SHAFT_KEYSTORE_BASE64" | base64 -d > isha-shaft.jks
          rm -f keystore.jks
          ls -la isha-shaft.jks

      - name: Detect branch
        if: github.ref_type == 'branch'
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "APK_SUFFIX=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Build debug apk
        if: github.ref_type == 'branch'
        env:
          SHAFT_EVENTS_HMAC: ${{ secrets.SHAFT_EVENTS_HMAC }}
          SHAFT_KEYSTORE_PASSWORD: ${{ secrets.SHAFT_KEYSTORE_PASSWORD }}
          SHAFT_KEY_ALIAS: ${{ secrets.SHAFT_KEY_ALIAS }}
          SHAFT_KEY_PASSWORD: ${{ secrets.SHAFT_KEY_PASSWORD }}
        run: ./gradlew assembleGithubDebug

      - name: Upload debug artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ env.APK_SUFFIX }}
          path: app/build/outputs/apk/github/debug

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version_tag=${GITHUB_REF/refs\/tags\//}
          version_tag_short=`echo $version_tag | awk 'NR==1,/v/{sub(/v/, "");print}'`
          echo "VERSION_TAG=$version_tag" >> $GITHUB_ENV
          echo "VERSION_TAG_SHORT=$version_tag_short" >> $GITHUB_ENV
          TAG_MESSAGE=$(git cat-file tag "$version_tag" 2>/dev/null | sed '1,/^$/d' || echo "Release $version_tag")
          if [ -z "$TAG_MESSAGE" ]; then TAG_MESSAGE="Release $version_tag"; fi
          echo "$TAG_MESSAGE" > /tmp/tag_message.txt
          git submodule update --init --recursive || true
          # re-apply keystore after any checkout side effects
          echo "$SHAFT_KEYSTORE_BASE64" | base64 -d > isha-shaft.jks
          rm -f keystore.jks
        env:
          SHAFT_KEYSTORE_BASE64: ${{ secrets.SHAFT_KEYSTORE_BASE64 }}

      - name: Build release apk
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SHAFT_EVENTS_HMAC: ${{ secrets.SHAFT_EVENTS_HMAC }}
          SHAFT_KEYSTORE_PASSWORD: ${{ secrets.SHAFT_KEYSTORE_PASSWORD }}
          SHAFT_KEY_ALIAS: ${{ secrets.SHAFT_KEY_ALIAS }}
          SHAFT_KEY_PASSWORD: ${{ secrets.SHAFT_KEY_PASSWORD }}
        run: ./gradlew assembleGithubRelease --stacktrace

      - name: Deal with release apk
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp app/build/outputs/apk/github/release/app-github-release.apk app-release.apk
          APK_NAME="Shaft-Isha_${VERSION_TAG_SHORT}.apk"
          cp app-release.apk "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          sha1=`sha1sum app-release.apk | awk '{ print toupper($1) }'`
          sha256=`sha256sum app-release.apk | awk '{ print toupper($1) }'`
          echo "APK_SHA1=$sha1" >> $GITHUB_ENV
          echo "APK_SHA256=$sha256" >> $GITHUB_ENV
          {
            cat /tmp/tag_message.txt
            echo ""
            echo "Fork: ishalumi/Pixiv-Shaft (based on upstream classic)"
            echo "Fix: 喜欢！数本地 total_bookmarks 过滤接线（RemoteRepo/FilterMapper）"
            echo ""
            echo '```'
            echo "SHA-1: $sha1"
            echo "SHA-256: $sha256"
            echo '```'
          } > release_notes.md

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: |
            ${{ env.APK_NAME }}
            app-release.apk

      - name: Draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: ${{ env.VERSION_TAG }}
          body_path: release_notes.md
          files: |
            ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
